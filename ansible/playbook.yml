---
- name: Install familia environment
  hosts: localhost
  connection: local
  become: yes  # sudo権限で実行
  vars:
    fnm_version: "v1.38.1"
    node_version: "25"
    npm_packages:
      - gog-cli
    apt_packages:
      - git
      - curl
      - unzip
      - golang

  tasks:
    - name: Install apt packages
      apt:
        name: "{{ item }}"
        state: present
        update_cache: yes
      loop: "{{ apt_packages }}"
